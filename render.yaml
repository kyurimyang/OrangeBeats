services:
  - type: web
    name: paran-playlist-ai
    runtime: python
    buildCommand: >
      cd frontend/site && npm install && npm run build && cd ../.. &&
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    nativePackages:
      - ffmpeg
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ACRCLOUD_HOST
        sync: false
      - key: ACRCLOUD_ACCESS_KEY
        sync: false
      - key: ACRCLOUD_ACCESS_SECRET
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: YTDLP_COOKIE_CONTENT
        sync: false
      - key: YTDLP_PO_TOKEN
        sync: false
      - key: YTDLP_VISITOR_DATA
        sync: false
