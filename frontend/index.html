<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orange Beats - Temp UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Orange Beats</p>
        <h1>YouTube → Spotify 임시 테스트 UI</h1>
        <p class="hero-text">
          API 임시 흐름 확인용
        </p>
      </div>
      <div class="hero-actions">
        <button id="spotifyLoginBtn" class="btn btn-primary">Spotify 로그인</button>
        <button id="clearBtn" class="btn btn-ghost">결과 지우기</button>
      </div>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>1. 입력</h2>

        <label for="youtubeUrl">YouTube URL</label>
        <input
          id="youtubeUrl"
          type="text"
          placeholder="https://www.youtube.com/watch?v=..."
        />

        <label>플레이리스트 제목 방식</label>
        <div class="radio-group">
          <label class="radio-card">
            <input type="radio" name="titleMode" value="youtube" checked />
            <span>유튜브 제목 그대로 사용</span>
          </label>
          <label class="radio-card">
            <input type="radio" name="titleMode" value="custom" />
            <span>직접 제목 입력</span>
          </label>
        </div>

        <label for="playlistName">직접 입력 제목</label>
        <input
          id="playlistName"
          type="text"
          placeholder="title_mode가 custom일 때 사용됨"
          disabled
        />

        <div class="button-row">
          <button id="analyzeBtn" class="btn btn-secondary">유튜브 분석만 실행</button>
          <button id="createBtn" class="btn btn-primary">Spotify 플레이리스트 생성</button>
        </div>

        <div class="notice">
          <strong>주의</strong>
          <p>
            현재 백엔드 구조상 Spotify 로그인 버튼을 누르면 Spotify 인증 페이지로 이동한다.
            인증이 끝나면 백엔드 callback JSON 화면이 뜰 수 있다. 그 뒤 이 화면으로 돌아와서 생성 버튼을 누르면 된다.
          </p>
        </div>
      </section>

      <section class="panel">
        <h2>2. 분석 결과</h2>
        <div id="summaryBox" class="summary empty">
          아직 분석 결과가 없습니다.
        </div>
        <ul id="songList" class="song-list"></ul>
      </section>

      <section class="panel panel-full">
        <div class="panel-header">
          <h2>3. 응답 로그</h2>
          <span id="statusBadge" class="badge">대기 중</span>
        </div>
        <pre id="resultBox" class="result-box">아직 요청 안 함</pre>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
